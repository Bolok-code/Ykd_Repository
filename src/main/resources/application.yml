spring:
  application:
    name: CLI-Toolbox
  config:
    import: optional:file:./config/application-local.yml
  main:
    banner-mode: "off"
    log-startup-info: false
    web-application-type: none
  lifecycle:
    timeout-per-shutdown-phase: 15s

logging:
  file:
    name: work/app.log
  level:
    root: INFO

app:
  weather:
    api-key: ${WEATHER_API_KEY:}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
    max-tokens: ${DEEPSEEK_MAX_TOKENS:1000}
    timeout-seconds: ${DEEPSEEK_TIMEOUT_SECONDS:60}
    thinking-enabled: ${DEEPSEEK_THINKING_ENABLED:false}
    history-rounds: ${DEEPSEEK_HISTORY_ROUNDS:10}
  bailian:
    api-key: ${DASHSCOPE_API_KEY:}
    workspace-id: ${BAILIAN_WORKSPACE_ID:}
    region: ${BAILIAN_REGION:cn-beijing}
    vision-model: ${BAILIAN_VISION_MODEL:qwen3.7-plus}
    image-model: ${BAILIAN_IMAGE_MODEL:qwen-image-2.0}
    image-size: ${BAILIAN_IMAGE_SIZE:1024*1024}
    timeout-seconds: ${BAILIAN_TIMEOUT_SECONDS:180}
    tts:
      model: ${BAILIAN_TTS_MODEL:qwen-audio-3.0-tts-flash}
      voice: ${BAILIAN_TTS_VOICE:longanlingxi}
      sample-rate: ${BAILIAN_TTS_SAMPLE_RATE:16000}
      timeout-seconds: ${BAILIAN_TTS_TIMEOUT_SECONDS:180}
